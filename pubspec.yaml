name: seraj_quran
description: "Siraj Quran - A professional Islamic mobile application with complete Quran, Adhkar, Duas, and Asma Ul Husna."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.5+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.8.1
  lottie: ^2.7.0
  intl: ^0.19.0
  share_plus: ^7.2.0
  url_launcher: ^6.2.0
  google_fonts: ^6.1.0
  hijri: ^3.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.0
  json_serializable: ^6.7.1
  flutter_native_splash: ^2.4.4

flutter_native_splash:
  color: "#4CAF50"
  image: assets/icons/holy_quran.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#4CAF50"
    image: assets/icons/holy_quran.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/holy_quran.png"
  min_sdk_android: 21
flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/icons/
    - assets/fonts/
    - assets/screenshots/

  fonts:
    - family: UthmanTN1
      fonts:
        - asset: assets/fonts/UthmanTN1-Ver10.otf