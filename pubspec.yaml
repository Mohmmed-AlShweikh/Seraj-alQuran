name: seraj_quran
description: "Siraj Quran - A professional Islamic mobile application with complete Quran, Adhkar, Duas, and Asma Ul Husna."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.5+1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # JSON Serialization
  json_annotation: ^4.8.1

  # Animations
  lottie: ^2.7.0

  # Icons & Utils
  intl: ^0.19.0
  share_plus: ^7.2.0
  url_launcher: ^6.2.0

  # GetX for advanced features (alternative to provider if needed)
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.0
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/animations/
    - assets/icons/
    - assets/fonts/
  fonts:
    - family: UthmanTN1
      fonts:
        - asset: assets/fonts/UthmanTN1-Ver10.otf
